<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Board - Local Note Taking</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Dashboard View -->
    <div id="dashboard" class="active">
        <header>
            <h1>📋 Project Board</h1>
            <button id="newProjectBtn" class="primary-btn">+ New Project</button>
        </header>
        <div id="projectsGrid" class="projects-grid"></div>
        <div id="emptyState" class="empty-state">
            <h2>No projects yet!</h2>
            <p>Click "New Project" to get started.</p>
        </div>
    </div>

    <!-- Whiteboard View -->
    <div id="whiteboard" class="hidden">
        <header class="whiteboard-header">
            <button id="backBtn" class="secondary-btn">← Back</button>
            <h2 id="projectTitle">Project Name</h2>
            <div class="toolbar">
                <button id="addNoteBtn" title="Add Sticky Note">📝 Note</button>
                <button id="addImageBtn" title="Add Image">🖼️ Image</button>
                <input type="file" id="imageInput" accept="image/*" class="hidden">
                <button id="connectModeBtn" title="Connect Nodes">🔗 Connect</button>
                <button id="bgSettingsBtn" title="Background Settings">🎨 Background</button>
                <button id="undoBtn" title="Undo">↩️ Undo</button>
                <button id="redoBtn" title="Redo">↪️ Redo</button>
                <button id="exportBtn" title="Export Project">💾 Export</button>
                <input type="file" id="importFile" accept=".json" class="hidden">
                <button id="importBtn" title="Import Project">📂 Import</button>
            </div>
        </header>
        
        <div id="canvasContainer">
            <div id="canvas">
                <div id="canvasContent"></div>
                <svg id="connectionsLayer"></svg>
            </div>
        </div>

        <!-- Formatting Toolbar (appears when text selected) -->
        <div id="formatToolbar" class="hidden">
            <label>Font Size:
                <select id="fontSizeSelect">
                    <option value="12">12px</option>
                    <option value="14">14px</option>
                    <option value="16" selected>16px</option>
                    <option value="18">18px</option>
                    <option value="20">20px</option>
                    <option value="24">24px</option>
                    <option value="28">28px</option>
                    <option value="32">32px</option>
                </select>
            </label>
            <label>Color:
                <input type="color" id="textColorPicker" value="#000000">
            </label>
            <label>Note Color:
                <input type="color" id="noteColorPicker" value="#fef3c7">
            </label>
            <label>Image Position:
                <select id="imagePositionSelect">
                    <option value="top">Image Top</option>
                    <option value="bottom">Image Bottom</option>
                </select>
            </label>
        </div>
    </div>

    <!-- Create/Edit Project Modal -->
    <div id="projectModal" class="modal hidden">
        <div class="modal-content">
            <h3 id="modalTitle">Create New Project</h3>
            <form id="projectForm">
                <input type="text" id="projectName" placeholder="Project Name" required>
                <textarea id="projectDescription" placeholder="Project Description" rows="4"></textarea>
                <div class="modal-buttons">
                    <button type="button" id="cancelBtn" class="secondary-btn">Cancel</button>
                    <button type="submit" id="saveProjectBtn" class="primary-btn">Save</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Background Settings Modal -->
    <div id="bgModal" class="modal hidden">
        <div class="modal-content">
            <h3>Background Settings</h3>
            <div class="bgOptions">
                <h4>Preset Backgrounds</h4>
                <div class="presetGrids">
                    <button class="bgPreset" data-bg="none">None</button>
                    <button class="bgPreset" data-bg="dots">Dots</button>
                    <button class="bgPreset" data-bg="grid">Grid</button>
                    <button class="bgPreset" data-bg="lines">Lines</button>
                    <button class="bgPreset" data-bg="gradient1">Gradient 1</button>
                    <button class="bgPreset" data-bg="gradient2">Gradient 2</button>
                    <button class="bgPreset" data-bg="gradient3">Gradient 3</button>
                    <button class="bgPreset" data-bg="dark">Dark</button>
                </div>
                <h4>Custom Image</h4>
                <input type="file" id="bgUpload" accept="image/*">
                <button id="clearBgBtn" class="secondary-btn">Clear Custom BG</button>
            </div>
            <button id="closeBgBtn" class="primary-btn">Close</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
